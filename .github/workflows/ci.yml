name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Pinned so the linted baseline is reproducible regardless of newer ruff
      # releases adding rules. Bump deliberately alongside a local re-lint.
      - run: pip install "ruff==0.14.2"
      - run: ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      # The unit tests need only numpy + onnx (the Core ML / Core AI runtimes are
      # imported lazily inside their workers, which the tests do not execute), so
      # CI runs on Linux. Full backend benchmarking still requires macOS / Apple
      # Silicon with onnxruntime, coremltools and coreai installed.
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[onnx,dev]"
      - run: pytest
